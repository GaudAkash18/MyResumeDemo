<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="">
        <caption>It is my table demosnstration</caption>
        <!--caption: it gives title to our table -->
        <!-- tr: table row -->
         <thead>
            <!-- thead: for table heading -->
         <tr> 
            <!-- td:table or table data -->
             <!-- th : to specify headings in html -->
            <th>2</th>
            <th>1</th>
            <th>3</th>
            <th>4</th>
         </tr>
         </thead>
         
         <tbody>
            <!-- tbody : to specify table body  -->
         <tr>
            <td  rowspan="2" >5</td>
            <!-- rowspan: mergers two rows (left to right  Rows) -->
            <td>6</td>
            <td>7</td>
            <td>8</td>
         </tr>
         <tr>
            <!-- <td>9</td> -->
            <td>10</td>
            <td>11</td>
            <td>12</td>
         </tr>
         <tr>
            <td colspan="2">13</td>
            <!-- colspan : mergers two columns(up to down colums) -->
            <td>14</td>
            <td>15</td>
            <!-- <td>16</td> -->
         </tr>
         <tr>
            <!-- using both rowspan and colspan -->
            <td rowspan="2" colspan="2">99</td>
            <!-- <td>98</td> -->
            <td>97</td>
            <td>96</td>
         </tr>
         <tr>
            <!-- <td>95</td> -->
            <!-- <td>94</td> -->
            <td>93</td>
            <td>92</td>
         </tr>
         </tbody>

         <tfoot>
            <!-- tfoot: to specify table foot  -->
            <tr>
                <td>abc</td>
                <td>xyz</td>
                <td>lmn</td>
                <td>qwt </td>
            </tr>
         </tfoot>
    </table>
</body>
</html>
